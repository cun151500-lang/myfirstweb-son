<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bài Tập 19 – Game Ghép Đôi Thẻ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0533 0%, #3b0764 50%, #1a0533 100%);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 48px;
      color: #fff;
    }

    header { text-align: center; margin-bottom: 24px; }

    header h1 {
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 900;
      background: linear-gradient(90deg, #f9a8d4, #c084fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p { font-size: 0.88rem; color: #c084fc; margin-top: 5px; }

    /* Scoreboard */
    .scoreboard {
      display: flex;
      gap: 18px;
      margin-bottom: 22px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(192,132,252,0.25);
      border-radius: 16px;
      padding: 12px 26px;
      backdrop-filter: blur(8px);
    }

    .score-item { text-align: center; }
    .score-item .label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: #c084fc; }
    .score-item .value { font-size: 1.6rem; font-weight: 800; color: #f0abfc; line-height: 1.2; }

    /* Grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      width: 100%;
      max-width: 380px;
    }

    @media (min-width: 500px) {
      .card-grid { grid-template-columns: repeat(4, 1fr); max-width: 540px; }
    }

    /* Card */
    .card { aspect-ratio: 1; perspective: 800px; cursor: pointer; }

    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(.4,0,.2,1);
      border-radius: 14px;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0;
      border-radius: 14px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(2rem, 9vw, 2.8rem);
      user-select: none;
    }

    .card-back {
      background: linear-gradient(135deg, #4c1d95, #6d28d9);
      border: 2px solid rgba(192,132,252,0.4);
      box-shadow: 0 4px 18px rgba(109,40,217,0.4);
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .card:not(.flipped):not(.matched):hover .card-back {
      box-shadow: 0 6px 28px rgba(192,132,252,0.65);
      border-color: rgba(240,171,252,0.75);
    }

    .card-back::after {
      content: '?';
      font-size: clamp(1.8rem, 7vw, 2.4rem);
      font-weight: 900;
      color: rgba(240,171,252,0.5);
    }

    .card-front {
      background: linear-gradient(135deg, #2e1065, #4a1d96);
      border: 2px solid rgba(240,171,252,0.5);
      transform: rotateY(180deg);
    }

    .card.matched .card-front {
      background: linear-gradient(135deg, #14532d, #166534);
      border-color: rgba(74,222,128,0.75);
      box-shadow: 0 0 22px rgba(74,222,128,0.45);
      animation: matchPop 0.4s ease;
    }

    @keyframes matchPop {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.13); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    /* Wrong shake */
    .card.wrong .card-inner {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25%      { transform: rotateY(180deg) translateX(-6px); }
      75%      { transform: rotateY(180deg) translateX(6px); }
    }

    /* Win overlay */
    .win-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10,2,30,0.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center; justify-content: center;
      animation: fadeIn 0.4s ease;
    }
    .win-overlay.show { display: flex; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .win-box {
      background: linear-gradient(135deg, #3b0764, #1e1b4b);
      border: 2px solid rgba(192,132,252,0.5);
      border-radius: 24px;
      padding: 36px 40px;
      text-align: center;
      max-width: 320px;
      width: 88%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .win-box .trophy { font-size: 3.5rem; display: block; animation: bounce 0.6s ease infinite alternate; }
    @keyframes bounce { to { transform: translateY(-10px); } }

    .win-box h2 {
      font-size: 1.8rem; font-weight: 900;
      background: linear-gradient(90deg, #fbbf24, #f9a8d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 12px 0 6px;
    }

    .win-box p { color: #c4b5fd; font-size: 0.95rem; }
    .win-box .moves-result { font-size: 2rem; font-weight: 800; color: #f0abfc; margin: 10px 0; }

    /* Buttons */
    .btn {
      padding: 12px 30px; border-radius: 50px; border: none;
      cursor: pointer; font-size: 1rem; font-weight: 700;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      box-shadow: 0 4px 16px rgba(124,58,237,0.5);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.6); }

    .reset-wrap { margin-top: 22px; }

    footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: rgba(196,181,253,0.4);
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>🃏 Memory Matching Game</h1>
  <p>Ghép đôi tất cả các thẻ để chiến thắng!</p>
</header>

<div class="scoreboard">
  <div class="score-item">
    <div class="label">Lượt đi</div>
    <div class="value" id="moves">0</div>
  </div>
  <div class="score-item">
    <div class="label">Đã khớp</div>
    <div class="value" id="matched">0</div>
  </div>
  <div class="score-item">
    <div class="label">Còn lại</div>
    <div class="value" id="remaining">4</div>
  </div>
</div>

<main>
  <section class="card-grid" id="cardGrid" aria-label="Bảng thẻ ghép đôi"></section>
</main>

<div class="reset-wrap">
  <button class="btn btn-primary" onclick="initGame()">🔄 Chơi Lại</button>
</div>

<div class="win-overlay" id="winOverlay" role="dialog" aria-modal="true">
  <div class="win-box">
    <span class="trophy">🏆</span>
    <h2>Chúc Mừng!</h2>
    <p>Bạn đã hoàn thành trong</p>
    <div class="moves-result"><span id="finalMoves">0</span> lượt</div>
    <p>Xuất sắc lắm! 🎉</p>
    <button class="btn btn-primary" style="margin-top:20px" onclick="initGame()">🔄 Chơi Lại</button>
  </div>
</div>

<footer>Bài Tập 19 – Nguyễn Trường Sơn · MSSV: 221A300484</footer>

<script>
  const EMOJIS = ['🐶','🐱','🦊','🐸'];
  const PAIRS  = [...EMOJIS, ...EMOJIS];

  let flipped = [], moves = 0, matchedCount = 0, locked = false;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function initGame() {
    moves = 0; matchedCount = 0; flipped = []; locked = false;
    updateScore();
    document.getElementById('winOverlay').classList.remove('show');

    const grid = document.getElementById('cardGrid');
    grid.innerHTML = '';

    shuffle(PAIRS).forEach((emoji, idx) => {
      const card = document.createElement('article');
      card.className = 'card';
      card.dataset.emoji = emoji;
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', 'Thẻ ' + (idx + 1));
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${emoji}</div>
        </div>`;
      card.addEventListener('click', () => flipCard(card));
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') flipCard(card); });
      grid.appendChild(card);
    });
  }

  function flipCard(card) {
    if (locked || card.classList.contains('flipped') || card.classList.contains('matched') || flipped.length >= 2) return;
    card.classList.add('flipped');
    flipped.push(card);
    if (flipped.length === 2) { moves++; updateScore(); checkMatch(); }
  }

  function checkMatch() {
    const [a, b] = flipped;
    if (a.dataset.emoji === b.dataset.emoji) {
      setTimeout(() => {
        a.classList.add('matched'); b.classList.add('matched');
        a.classList.remove('flipped'); b.classList.remove('flipped');
        flipped = [];
        matchedCount++;
        updateScore();
        if (matchedCount === EMOJIS.length) setTimeout(showWin, 300);
      }, 400);
    } else {
      locked = true;
      a.classList.add('wrong'); b.classList.add('wrong');
      setTimeout(() => {
        a.classList.remove('flipped','wrong');
        b.classList.remove('flipped','wrong');
        flipped = []; locked = false;
      }, 900);
    }
  }

  function updateScore() {
    document.getElementById('moves').textContent     = moves;
    document.getElementById('matched').textContent   = matchedCount;
    document.getElementById('remaining').textContent = EMOJIS.length - matchedCount;
  }

  function showWin() {
    document.getElementById('finalMoves').textContent = moves;
    document.getElementById('winOverlay').classList.add('show');
  }

  initGame();
</script>
</body>
</html>
